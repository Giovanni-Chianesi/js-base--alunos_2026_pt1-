<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 4: Requisições Assíncronas</title>
</head>
<body>
  <button id="myButton">Buscar Dados</button>

  <p id="myText"></p>

  <!-- JS -->
  <script>

    const button = document.querySelector('#myButton');
    const text = document.querySelector('#myText');

    button.addEventListener('click', () => {
      fetch ('https://jsonplaceholder.typicode.com/todos/2')
      .then(response => response.json())
      //Exibe todos os parametros de resposta no paragrafo
      .then(data => {
        text.innerHTML = `
        User ID: ${data.userId}<br>
        ID: ${data.id}<br>
        Titulo: ${data.title}<br>
        Completo: ${data.completed};
        `;
      })
      .catch(error => {
        //Exibe uma mensagem caso a requisição falhe
        text.textContent = 'Erro ao Buscar Dados';
      });
    });
  </script>
</body>
</html>
