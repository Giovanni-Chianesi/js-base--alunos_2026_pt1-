<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 5: Animação Simples</title>
  <style>
    /* Estilo da div que será animada */
    #myDiv {
      width: 100px;
      height: 100px;
      background-color: lightgreen;
      position: relative;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <button id="myButton">Mover</button>

  <div id="myDiv"></div>

  <!-- JS -->
  <script>

    const button = document.querySelector('#myButton');
    const div = document.querySelector('#myDiv');
    let position = 0; //Variavel pra controlar a posição

    button.addEventListener('click', () => {
      //Alterna posição em 50 pixels
      position += 50;
      //Move a div para a nova posição
      div.style.left = `${position}px`;
    });
  </script>
</body>
</html>
