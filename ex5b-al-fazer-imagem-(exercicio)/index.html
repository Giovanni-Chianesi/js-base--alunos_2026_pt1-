<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 5b: Troca de Imagem</title>
  <style>
    /* Estilo básico para centralizar a imagem e o texto */
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
    }

    /* Contêiner para a imagem e o texto */
    .image-container {
      text-align: center;
    }

    /* Estilo da imagem */
    img {
      width: 200px;
      height: 200px; 
      border: 2px solid black;
      border-radius: 10px; 
      transition: transform 0.3s ease;
    }

    img:hover {
      transform: scale(1.05); /* Aumenta ligeiramente o tamanho */
    }

    #myText {
      margin-top: 20px;
      font-size: 1.5em;
      font-weight: bold;
      color: #333;
    }

    .subtext {
      margin-top: 10px;
      font-size: 1.2em;
      color: #555;
    }
  </style>
</head>
<body>
  <!-- Contêiner para a imagem e o texto -->
  <div class="image-container">
    <!-- Imagem que será alterada -->
    <img id="myImage" src="image.png" alt="Imagem 1">

    <!-- Texto principal que será modificado -->
    <p id="myText">Passe o mouse sobre a imagem</p>

    <!-- Texto adicional MUITO necessário do PROFESSOR -->
    <p class="subtext" id="subText">Sabrina Carpenter - Linda!</p>
  </div>

  <!-- JS Embutido -->

  <script>
    const myImage = document.querySelector('#myImage');
    const myText = document.querySelector('#myText');
    const subText = document.querySelector('#subText');

    myImage.addEventListener('mouseover', () => {
      myImage.src = 'image2.png'; // Altere para a segunda imagem
      myText.textContent = 'Quem é ela?'; // Altere o texto
      subText.textContent = 'Who is This?'; // Altere o texto adicional
    });

    myImage.addEventListener('mouseout', () => {
      myImage.src = 'image.png'; // Volte para a imagem original
      myText.textContent = 'Passe o mouse sobre a imagem'; // Volte para o texto 
      subText.textContent = 'Sabrina Carpenter - Linda!'; // Mantem o texto adicional
    });

  </script>
</body>
</html>
